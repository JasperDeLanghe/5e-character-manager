# ================================================================
#  D&D 5E CHARACTER SHEET
#  All derived stats (modifiers, skill bonuses, spell save DC, etc.)
#  are calculated at PDF-generation time from the raw values here.
# ================================================================

# ----------------------------------------------------------------
#  IDENTITY
# ----------------------------------------------------------------
name: "Pedro Salazar"
player: "Jasper"

# ----------------------------------------------------------------
#  CLASS & LEVEL
# ----------------------------------------------------------------
class: "Paladin"
subclass: "Oath of Devotion"
level: 6
background: "Noble"
race: "Human"
alignment: "Lawful Good"
experience: "milestone"

# ----------------------------------------------------------------
#  ABILITY SCORES
#  Raw scores only — modifiers are derived (+floor((score-10)/2))
# ----------------------------------------------------------------
abilities:
  strength: 16
  dexterity: 12
  constitution: 16
  intelligence: 12
  wisdom: 12
  charisma: 12

# ----------------------------------------------------------------
#  COMBAT
# ----------------------------------------------------------------
hit_points:
  max: 50
  current: 50
  temp: 0

hit_dice:
  used: 0
  die: "d10"

armor_class: 17 # Plate armor; update if armor changes
initiative_bonus: 1 # Typically DEX mod; override here if needed (e.g. Alert feat)
speed: 30 # ft

death_saves:
  successes: 0
  failures: 0

# ----------------------------------------------------------------
#  SAVING THROWS
#  List the abilities you are proficient in.
# ----------------------------------------------------------------
saving_throw_proficiencies:
  - wisdom
  - charisma

# ----------------------------------------------------------------
#  SKILLS
#  List proficient and expertise skills separately.
#  Valid values: acrobatics, animal_handling, arcana, athletics,
#  deception, history, insight, intimidation, investigation,
#  medicine, nature, perception, performance, persuasion, religion,
#  sleight_of_hand, stealth, survival
# ----------------------------------------------------------------
skill_proficiencies:
  - history
  - insight
  - intimidation
  - persuasion

# ----------------------------------------------------------------
#  ATTACKS
# ----------------------------------------------------------------
attacks:
  - name: "Willet's Flail"
    is_magic: true
    # attack_bonus = STR mod + proficiency + magic bonus
    damage: "1d8" # STR mod not included; magic bonus not included
    damage_type: "bludgeoning"
    notes: "Martial, sap, ball can be thrown up to 20ft"
  - name: "Javelin"
    # attack_bonus = STR mod + proficiency + magic bonus
    damage: "1d6" # STR mod not included; magic bonus not included
    damage_type: "piercing"
    notes: "Simple, thrown, Slow, Range 30/120"
  - name: "Unarmed Strike"
    # attack_bonus = STR mod + proficiency + magic bonus
    damage: "1d4" # STR mod not included; magic bonus not included
    damage_type: "bludgeoning"
    notes: ""
  - name: "Shield of the Astral Guardian"
    is_magic: true
    # attack_bonus = STR mod + proficiency + magic bonus
    damage: "1d4" # STR mod not included; magic bonus not included
    damage_type: "bludgeoning"
    notes: "Can cast shield and counterspell once per long rest without expending a spell slot." # manually update every 5 levels
  - name: "Divine Smite"
    damage: "2d8"
    damage_type: "radiant"
    notes: "On hit; expend a spell slot. +1d8 per slot level above 1st. +1d8 vs undead/fiends."

# ----------------------------------------------------------------
#  SPELLCASTING
# ----------------------------------------------------------------
spellcasting:
  ability: "charisma"
  # spell_save_dc and spell_attack_bonus are derived at generation time:
  #   DC = 8 + proficiency_bonus + ability_modifier
  #   attack = proficiency_bonus + ability_modifier

  slots:
    1st: { total: 4, used: 0 }
    2nd: { total: 2, used: 0 }
    3rd: { total: 0, used: 0 }
    4th: { total: 0, used: 0 }
    5th: { total: 0, used: 0 }

  cantrips: []

  # Spells you have chosen to prepare today
  prepared:
    - "Compelled Duel"
    - "Cure Wounds"
    - "Shield of Faith"
    - "Heroism"
    - "Branding Smite"
    - "Find Steed"

  # Oath spells are always prepared and don't count against your limit
  oath_spells:
    - { name: "Protection from Evil and Good", level: 1, unlocked_at: 3 }
    - { name: "Sanctuary", level: 1, unlocked_at: 3 }
    - { name: "Lesser Restoration", level: 2, unlocked_at: 5 }
    - { name: "Zone of Truth", level: 2, unlocked_at: 5 }
    - { name: "Beacon of Hope", level: 3, unlocked_at: 9 }
    - { name: "Dispel Magic", level: 3, unlocked_at: 9 }
    - { name: "Freedom of Movement", level: 4, unlocked_at: 13 }
    - { name: "Guardian of Faith", level: 4, unlocked_at: 13 }
    - { name: "Commune", level: 5, unlocked_at: 17 }
    - { name: "Flame Strike", level: 5, unlocked_at: 17 }

# ----------------------------------------------------------------
#  RACIAL TRAITS
# ----------------------------------------------------------------
racial_traits: []

# ----------------------------------------------------------------
#  CLASS FEATURES
# ----------------------------------------------------------------
class_features:
  - name: "Divine Sense"
    source: "Paladin 1"
    phb: 84
    uses: { total: 5, used: 0, recharge: "long rest" }
    description: |
      Detect celestials, fiends, or undead within 60 ft until the end of
      your next turn. Doesn't penetrate total cover.

  - name: "Lay on Hands"
    source: "Paladin 1"
    phb: 84
    uses: { pool: 30, used: 0, recharge: "long rest" }
    description: |
      Restore HP from a healing pool of 5 x paladin level. 
      Alternatively, spend 5 HP from the pool to cure one disease 
      or neutralize one poison.

  - name: "Fighting Style: Protection"
    source: "Paladin 2"
    phb: 84
    description: |
      When a creature you can see attacks a target other than you that is
      within 5 feet of you, you can use your reaction to impose disadvantage
      on the attack role. You must be wielding a shield.

  - name: "Divine Smite"
    source: "Paladin 2"
    phb: 85
    description: |
      When you hit with a melee weapon attack, expend a spell slot to deal
      2d8 radiant damage (+1d8 per slot level above 1st, max 5d8).
      +1d8 additional damage against undead or fiends.

  - name: "Divine Health"
    source: "Paladin 3"
    phb: 85
    description: |
      Immune to disease.

  - name: "Channel Divinity"
    source: "Paladin 3"
    phb: 86
    uses: { total: 1, used: 0, recharge: "short rest" }
    description: |
      Use one of your Channel Divinity options (see Oath features below).

  - name: "Sacred Weapon"
    source: "Oath of Devotion 3"
    phb: 86
    description: |
      Channel Divinity: As an action, you can imbue one weapon that you are
      holding with positive energy, using your Channel Divinity. For 1 minute,
      you add your charisma modifier to attack rolls made with that weapon
      (with a minimum bonus of +1). The weapon also emits bright light in a
      20-foot radius and dim light 20 feet beyond that. If the weapon is not
      already magical, it becomes magical for the duration. You can end this
      effect on your turn as part of any other action. If you are no longer
      holding or carrying this weapon, or if you fall unconscious, this effect
      ends.

  - name: "Turn the Unholy"
    source: "Oath of Devotion 3"
    phb: 86
    description: |
      Channel Divinity: As an action, you present your holy symbol and speak
      a prayer censuring fiends and undead, using your Channel Divinity. Each
      fiend or undead that can see or hear you within 30 feet of you must make
      a Wisdom saving throw. If the creature fails its saving throw, it is
      turned for 1 minute or until it takes damage. A turned creature must spend
      its turns trying to move as far away form you as it can, and it can't
      willingly move to a space within 30 feet of you. It also can't take
      reactions. For its action, it can use only the Dash action or try to
      escape from an effect that prevents it from moving. If there is nowhere to
      move, the creature can use the Dodge action.

  - name: "Extra Attack"
    source: "Paladin 5"
    phb: 85
    description: |
      Attack twice whenever you take the Attack action on your turn.

  - name: "Aura of Protection"
    source: "Paladin 6"
    phb: 85
    description: |
      While conscious, you and friendly creatures within 10 ft add your
      CHA modifier (+1) to saving throws.

