# ================================================================
#  D&D 5E CHARACTER SHEET
#  All derived stats (modifiers, skill bonuses, spell save DC, etc.)
#  are calculated at PDF-generation time from the raw values here.
# ================================================================

# ----------------------------------------------------------------
#  IDENTITY
# ----------------------------------------------------------------
name: "Zara Ghorbani"
player: "Cis"

# ----------------------------------------------------------------
#  CLASS & LEVEL
# ----------------------------------------------------------------
class: "Fighter"
subclass: "Battle Master"
level: 6
background: "Folk Hero"
race: "Tiefling"
alignment: "Chaotic Good"
experience: "milestone"

# ----------------------------------------------------------------
#  ABILITY SCORES
#  Raw scores only — modifiers are derived (+floor((score-10)/2))
# ----------------------------------------------------------------
abilities:
  strength: 14
  dexterity: 17
  constitution: 16
  intelligence: 10
  wisdom: 11
  charisma: 10

# ----------------------------------------------------------------
#  COMBAT
# ----------------------------------------------------------------
hit_points:
  max: 49
  current: 49
  temp: 0

hit_dice:
  used: 0
  die: "d10"

armor_class: 17 # Plate armor; update if armor changes
initiative_bonus: 1 # Typically DEX mod; override here if needed (e.g. Alert feat)
speed: 30 # ft

death_saves:
  successes: 0
  failures: 0

# ----------------------------------------------------------------
#  SAVING THROWS
#  List the abilities you are proficient in.
# ----------------------------------------------------------------
saving_throw_proficiencies:
  - strength
  - constitution

# ----------------------------------------------------------------
#  SKILLS
#  List proficient and expertise skills separately.
#  Valid values: acrobatics, animal_handling, arcana, athletics,
#  deception, history, insight, intimidation, investigation,
#  medicine, nature, perception, performance, persuasion, religion,
#  sleight_of_hand, stealth, survival
# ----------------------------------------------------------------
skill_proficiencies:
  - animal_handling
  - athletics
  - perception
  - survival

# ----------------------------------------------------------------
#  ATTACKS
# ----------------------------------------------------------------
attacks:
  - name: "Ghorbani Scimitar"
    is_magic: true

    damage: "1d6" # DEX mod not included; magic bonus not included
    damage_type: "slashing"
    notes: "Martial, finesse, light"
  - name: "Ghorbani Scimitar (off-hand)"
    is_magic: true
    # attack_bonus = DEX mod + proficiency + magic bonus
    damage: "1d6" # DEX mod not included; magic bonus not included
    damage_type: "slashing"
    notes: "Martial, finesse, light"
  - name: "Crossbow, light"
    # attack_bonus = DEX mod + proficiency + magic bonus
    damage: "1d8" # DEX mod not included; magic bonus not included
    damage_type: "piercing"
    notes: "Simple, ranged, ammunition, loading, range 80/320"
  - name: "Unarmed Strike"
    # attack_bonus = STR mod
    damage: "1d4" # STR mod not included; no magic bonus
    damage_type: "bludgeoning"
    notes: ""
  - name: "Sashimi Knife"
    # attack_bonus = DEX mod + proficiency + magic bonus
    damage: "1d4" # DEX mod not included; magic bonus not included
    damage_type: "piercing"
    notes: "Simple, finesse, light"
  - name: "Silver Sword"
    # attack_bonus = DEX mod + proficiency + magic bonus
    damage: "1d6" # DEX mod not included; magic bonus not included
    damage_type: "slashing"
    notes: "Martial, finesse, light; silvered"

# ----------------------------------------------------------------
#  SPELLCASTING
# ----------------------------------------------------------------
spellcasting:
  ability: "intelligence"
  # spell_save_dc and spell_attack_bonus are derived at generation time:
  #   DC = 8 + proficiency_bonus + ability_modifier
  #   attack = proficiency_bonus + ability_modifier

  slots:
    1st: { total: 0, used: 0 }
    2nd: { total: 0, used: 0 }
    3rd: { total: 0, used: 0 }
    4th: { total: 0, used: 0 }
    5th: { total: 0, used: 0 }

  cantrips:
    - "Thaumaturgy"

  # Spells you have chosen to prepare today
  prepared: []

# ----------------------------------------------------------------
#  RACIAL TRAITS
# ----------------------------------------------------------------
racial_traits:
  - name: "Darkvision"
    description: |
      See in dim light within 60 ft as if it were bright light, and in
      darkness as if it were dim light. Can't discern color in darkness.

  - name: "Hellish Resistance"
    description: |
      Resistance to fire damage. Take half damage, minus proficiency bonus, from fire attacks.

  - name: "Infernal Legacy"
    description: |
      You know the Thaumaturgy cantrip. At 3rd level, you can cast the
      Hellish Rebuke spell once per day as a 2nd-level spell. At 5th level,
      you can also cast the Darkness spell once per day. Charisma is your
      spellcasting ability for these spells.

# ----------------------------------------------------------------
#  CLASS FEATURES
# ----------------------------------------------------------------
class_features:
  - name: "Fighting Style: Two-Weapon Fighting"
    source: "Fighter 1"
    phb: 72
    description: |
      When you engage in two-weapon fighting, you can add your ability modifier
      to the damage of the second attack.

  - name: "Second Wind"
    source: "Fighter 1"
    phb: 72
    description: |
      You have a limited well of stamina that you can draw on to protect yourself from harm. On your turn, you can use a bonus action to regain hit points equal to 1d10 + your fighter level. Once you use this feature, you must finish a short or long rest before you can use it again.

  - name: "Action Surge"
    source: "Fighter 2"
    phb: 72
    description: |
      Starting at 2nd level, you can push yourself beyond your normal limits for a moment. On your turn, you can take one additional action on top of your regular action and a possible bonus action. Once you use this feature, you must finish a short or long rest before you can use it again.

  - name: "Extra Attack"
    source: "Fighter 5"
    phb: 72
    description: |
      Beginning at 5th level, you can attack twice, instead of once, whenever you take the Attack action on your turn.

  - name: "Combat Superiority"
    source: "Battle Master 3"
    phb: 73
    description: |
      You learn maneuvers that are fueled by special dice called superiority dice. You have four superiority dice, which are d8s. A superiority die is expended when you use it. You regain all of your expended superiority dice when you finish a short or long rest.

  - name: "Disarming Attack"
    source: "Battle Master 3"
    phb: 74
    description: |
      When you hit a creature with a weapon attack, you can expend one superiority die to attempt to disarm the target, forcing it to drop one item of your choice that it's holding. You add the superiority die to the attack's damage roll, and the target must make a Strength saving throw. On a failed save, it drops the object you choose. The object lands at its feet.

  - name: "Menacing Attack"
    source: "Battle Master 3"
    phb: 74
    description: |
      When you hit a creature with a weapon attack, you can expend one superiority die to attempt to frighten the target. You add the superiority die to the attack's damage roll, and the target must make a Wisdom saving throw. On a failed save, it is frightened of you until the end of your next turn.

  - name: "Sweeping Attack"
    source: "Battle Master 3"
    phb: 74
    description: |
      When you hit a creature with a melee weapon attack, you can expend one superiority die to attempt to strike another creature within 5 feet of the original target with the same attack. You add the superiority die to the attack's damage roll, and if the original attack roll would hit the second creature, it takes damage equal to the superiority die. The two attacks must be against different targets.

