# ================================================================
#  D&D 5E CHARACTER SHEET
#  All derived stats (modifiers, skill bonuses, spell save DC, etc.)
#  are calculated at PDF-generation time from the raw values here.
# ================================================================

# ----------------------------------------------------------------
#  IDENTITY
# ----------------------------------------------------------------
name: ""
player: ""

# ----------------------------------------------------------------
#  CLASS & LEVEL
# ----------------------------------------------------------------
class: ""
subclass: ""
level: 1
background: ""
race: ""
alignment: ""
experience: "" # "milestone" or numeric value

# ----------------------------------------------------------------
#  ABILITY SCORES
#  Raw scores only — modifiers are derived (+floor((score-10)/2))
# ----------------------------------------------------------------
abilities:
  strength: 10
  dexterity: 10
  constitution: 10
  intelligence: 10
  wisdom: 10
  charisma: 10

# ----------------------------------------------------------------
#  COMBAT
# ----------------------------------------------------------------
hit_points: 0

hit_dice: "d10" # Depends on class; used for short rest healing

armor_class: 10
initiative_bonus: 1 # Typically DEX mod; override here if needed (e.g. Alert feat)
speed: 30 # ft

death_saves:
  successes: 0
  failures: 0

# ----------------------------------------------------------------
#  SAVING THROWS
#  List the abilities you are proficient in.
# ----------------------------------------------------------------
saving_throw_proficiencies:
  - wisdom
  - charisma

# ----------------------------------------------------------------
#  SKILLS
#  List proficient and expertise skills separately.
#  Valid values: acrobatics, animal_handling, arcana, athletics,
#  deception, history, insight, intimidation, investigation,
#  medicine, nature, perception, performance, persuasion, religion,
#  sleight_of_hand, stealth, survival
# ----------------------------------------------------------------
skill_proficiencies:
  - history
  - insight
  - intimidation
  - persuasion

# ----------------------------------------------------------------
#  ATTACKS
# ----------------------------------------------------------------
attacks:
  - name: "Unarmed Strike"
    attack_bonus: "+6" # STR mod + proficiency
    damage: "1d4"
    damage_type: "bludgeoning"
    notes: ""

# ----------------------------------------------------------------
#  SPELLCASTING
# ----------------------------------------------------------------
spellcasting:
  ability: "charisma"
  # spell_save_dc and spell_attack_bonus are derived at generation time:
  #   DC = 8 + proficiency_bonus + ability_modifier
  #   attack = proficiency_bonus + ability_modifier

  slots:
    1st: { total: 0, used: 0 }
    2nd: { total: 0, used: 0 }
    3rd: { total: 0, used: 0 }
    4th: { total: 0, used: 0 }
    5th: { total: 0, used: 0 }

  cantrips: []

  # Spells you have chosen to prepare today
  prepared:
    - "Compelled Duel"

# ----------------------------------------------------------------
#  RACIAL TRAITS
# ----------------------------------------------------------------
racial_traits: []

# ----------------------------------------------------------------
#  CLASS FEATURES
# ----------------------------------------------------------------
class_features:
  - name: "Divine Sense"
    source: "Paladin 1"
    phb: 84
    uses: { total: 5, used: 0, recharge: "long rest" }
    description: |
      Detect celestials, fiends, or undead within 60 ft until the end of
      your next turn. Doesn't penetrate total cover.

# ----------------------------------------------------------------
#  PROFICIENCIES & LANGUAGES
# ----------------------------------------------------------------
armor_proficiencies: [light]
weapon_proficiencies: [simple]
tool_proficiencies: ["vehicles (land)"]
languages: ["Common", "Common Sign Language"]

# ----------------------------------------------------------------
#  PERSONALITY
# ----------------------------------------------------------------
personality_traits: ""
ideals: ""
bonds: ""
flaws: ""

# ----------------------------------------------------------------
#  BACKSTORY
# ----------------------------------------------------------------
backstory: |
  TODO

# ----------------------------------------------------------------
#  APPEARANCE
# ----------------------------------------------------------------
appearance:
  age: 0
  height: 0
  weight: 0
  eyes: ""
  skin: ""
  hair: ""

# ----------------------------------------------------------------
#  EQUIPMENT & CURRENCY
# ----------------------------------------------------------------
currency:
  cp: 0
  sp: 0
  ep: 0
  gp: 0
  pp: 0

equipment:
  - name: "Ring mail"
  - name: "Javelin"
    amount: 5
